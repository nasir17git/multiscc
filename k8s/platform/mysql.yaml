# https://artifacthub.io/packages/helm/bitnami/mysql/12.6.0
# helm upgrade mysql bitnami/mysql --version 14.0.3 -n database -f ./platform/mysql.yaml

image:
  repository: bitnamilegacy/mysql
  tag: 9.4.0-debian-12-r1

service:
  type: NodePort
  nodePort: 30005

architecture: standalone

auth:
  rootPassword: petclinic
  database: petclinic
  username: petclinic
  password: petclinic

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "TCP"