nameOverride: kube-prometheus-stack
fullnameOverride: kube-prometheus-stack
namespaceOverride: kube-prometheus-stack
prometheus:
  prometheusSpec:
    retention: 90d # default: 10d
    retentionSize: "20GiB" # default: ""
    scrapeInterval: '30s' # default: 30s / minimum: ms ((([0-9]+)y)?(([0-9]+)w)?(([0-9]+)d)?(([0-9]+)h)?(([0-9]+)m)?(([0-9]+)s)?(([0-9]+)ms)?|0),
    evaluationInterval: '30s'
    storageSpec: 
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    additionalScrapeConfigs:
      - job_name: 'istiod'
        kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
            - istio-system
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: istiod;http-monitoring
      - job_name: 'envoy-stats'
        metrics_path: /stats/prometheus
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_container_port_name]
          action: keep
          regex: '.*-envoy-prom'
grafana: 
  adminPassword: admin1! #ID: admin
  defaultDashboardsTimezone: Asia/Seoul
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      isDefaultDatasource: true
      uid: prometheus
      createPrometheusReplicasDatasources: false
      label: grafana_datasource
      labelValue: '1'
      # url: http://prometheus-stack-prometheus:9090/
  service:
    portName: http-web
    type: LoadBalancer
  serviceMonitor:
    enabled: true
    path: '/metrics'
    interval: ''
    scheme: http
    tlsConfig: {}
    scrapeTimeout: 30s
  persistence:
    enabled: true
    type: pvc
    accessModes:
    - ReadWriteOnce
    size: 10Gi