#  kaf ./helmtest/application/4-application.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  sources:
    - repoURL: 'https://argoproj.github.io/argo-helm'
      chart: argo-cd
      targetRevision: 9.3.7
      helm:
        valueFiles:
          - $values/helmtest/values/argocd-values.yaml
    - repoURL: 'https://github.com/nasir17git/multiscc.git'
      targetRevision: master
      ref: values
    - repoURL: 'https://github.com/nasir17git/multiscc.git'
      path: ./helmtest/single
      targetRevision: HEAD
  destination:
    namespace: argocd
    server: 'https://kubernetes.default.svc'
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true